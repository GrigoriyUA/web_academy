<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Calculator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');

    :root {
      --bg:       #1e1e2e;
      --surface:  #27273a;
      --panel:    #2d2d42;
      --border:   #3a3a55;
      --accent:   #7aa2f7;
      --green:    #9ece6a;
      --orange:   #e0af68;
      --red:      #f7768e;
      --text:     #cdd6f4;
      --muted:    #6c7086;
      --binary:   rgba(122,162,247,0.07);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fira Code', monospace;
      overflow: hidden;
    }

    /* Binary rain canvas sits behind everything */
    #binary-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.55;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 3px;
    }

    .header .subtitle {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* Card */
    .calc {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      width: 320px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(122,162,247,0.08);
    }

    /* Display */
    .display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px 12px;
      margin-bottom: 18px;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
    }

    .display-label {
      position: absolute;
      top: 8px; left: 12px;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .expression {
      color: var(--muted);
      font-size: 0.72rem;
      text-align: right;
      min-height: 16px;
      word-break: break-all;
    }

    .result {
      color: var(--text);
      font-size: 1.9rem;
      font-weight: 300;
      text-align: right;
      word-break: break-all;
      transition: color 0.15s;
      margin-top: 2px;
    }

    .result.error {
      color: var(--red);
      font-size: 1rem;
    }

    /* Blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      opacity: 0.7;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    button {
      font-family: 'Fira Code', monospace;
      font-size: 0.95rem;
      font-weight: 400;
      padding: 13px 0;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
      user-select: none;
      letter-spacing: 0.5px;
    }

    button:active { transform: scale(0.95); }

    /* Numbers */
    .btn-num {
      background: var(--panel);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-num:hover {
      background: #353552;
      border-color: var(--accent);
      color: #fff;
    }

    /* Operators */
    .btn-op {
      background: rgba(122,162,247,0.1);
      color: var(--accent);
      border-color: rgba(122,162,247,0.2);
    }
    .btn-op:hover {
      background: rgba(122,162,247,0.18);
      border-color: var(--accent);
    }

    /* Clear */
    .btn-clear {
      background: rgba(247,118,142,0.1);
      color: var(--red);
      border-color: rgba(247,118,142,0.2);
    }
    .btn-clear:hover {
      background: rgba(247,118,142,0.18);
      border-color: var(--red);
    }

    /* Equals */
    .btn-eq {
      background: rgba(158,206,106,0.12);
      color: var(--green);
      border-color: rgba(158,206,106,0.25);
      grid-row: span 2;
      font-size: 1.3rem;
    }
    .btn-eq:hover {
      background: rgba(158,206,106,0.2);
      border-color: var(--green);
    }

    /* Zero */
    .btn-zero { grid-column: span 2; }

    /* Status bar */
    .statusbar {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 1.5px;
    }

    .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
  </style>
</head>
<body>

<canvas id="binary-canvas"></canvas>

<div class="container">
  <div class="header">
    <h1>// calculator</h1>
    <div class="subtitle">binary math engine &gt; v2.0</div>
  </div>

  <div class="calc">
    <div class="display">
      <span class="display-label">STDIN</span>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0<span class="cursor"></span></div>
    </div>

    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="deleteLast()">DEL</button>
      <button class="btn-op"    onclick="append('%')">%</button>
      <button class="btn-op"    onclick="append('/')">÷</button>

      <button class="btn-num"   onclick="append('7')">7</button>
      <button class="btn-num"   onclick="append('8')">8</button>
      <button class="btn-num"   onclick="append('9')">9</button>
      <button class="btn-op"    onclick="append('*')">×</button>

      <button class="btn-num"   onclick="append('4')">4</button>
      <button class="btn-num"   onclick="append('5')">5</button>
      <button class="btn-num"   onclick="append('6')">6</button>
      <button class="btn-op"    onclick="append('-')">−</button>

      <button class="btn-num"   onclick="append('1')">1</button>
      <button class="btn-num"   onclick="append('2')">2</button>
      <button class="btn-num"   onclick="append('3')">3</button>
      <button class="btn-op"    onclick="append('+')">+</button>

      <button class="btn-num btn-zero" onclick="append('0')">0</button>
      <button class="btn-num"   onclick="append('.')">.</button>
      <button class="btn-eq"    onclick="compute()">=</button>
    </div>

    <div class="statusbar">
      <span><span class="dot"></span>ONLINE</span>
      <span id="statusMsg">READY</span>
      <span>exit 0</span>
    </div>
  </div>
</div>

<script>
  // ── Binary rain ─────────────────────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('binary-canvas');
    const ctx    = canvas.getContext('2d');
    const COL_W  = 18;
    let cols, drops;

    const FONT_SIZE = 16;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.floor(canvas.width / COL_W);
      drops = Array.from({ length: cols }, () => Math.random() * -(canvas.height / FONT_SIZE));
    }

    window.addEventListener('resize', resize);
    resize();

    function draw() {
      // Slow fade — keeps a readable trail
      ctx.fillStyle = 'rgba(30,30,46,0.08)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = `${FONT_SIZE}px "Fira Code", monospace`;

      for (let i = 0; i < cols; i++) {
        const y = drops[i] * FONT_SIZE;
        const x = i * COL_W;

        // Use fixed bit per column — changes only occasionally
        if (!drops._bits) drops._bits = {};
        if (!drops._bits[i] || Math.random() > 0.97) {
          drops._bits[i] = Math.random() > 0.5 ? '1' : '0';
        }
        const bit = drops._bits[i];

        // Head — bright white so it's clearly readable
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillText(bit, x, y);

        // Second row — accent blue
        ctx.fillStyle = 'rgba(122,162,247,0.7)';
        ctx.fillText(bit, x, y - FONT_SIZE);

        // Third row — softer
        ctx.fillStyle = 'rgba(122,162,247,0.35)';
        ctx.fillText(bit, x, y - FONT_SIZE * 2);

        // Reset column when it goes off screen
        if (y > canvas.height && Math.random() > 0.97) {
          drops[i] = 0;
        }
        drops[i] += 0.3;
      }
    }

    setInterval(draw, 60);
  })();

  // ── Calculator ───────────────────────────────────────────────────────────────
  let expr = '';
  let justComputed = false;

  const exprEl   = document.getElementById('expression');
  const resultEl = document.getElementById('result');
  const statusEl = document.getElementById('statusMsg');

  function displayResult(text, isError = false) {
    resultEl.className = 'result' + (isError ? ' error' : '');
    resultEl.innerHTML = text + '<span class="cursor"></span>';
  }

  function append(char) {
    if (justComputed && /[0-9.]/.test(char)) {
      expr = char;
    } else if (justComputed) {
      justComputed = false;
      expr += char;
    } else {
      expr += char;
    }
    justComputed = false;
    exprEl.textContent = expr;
    displayResult(expr || '0');
    statusEl.textContent = 'INPUT';
  }

  function clearAll() {
    expr = '';
    justComputed = false;
    exprEl.textContent = '';
    displayResult('0');
    statusEl.textContent = 'CLEARED';
    setTimeout(() => statusEl.textContent = 'READY', 800);
  }

  function deleteLast() {
    expr = expr.slice(0, -1);
    exprEl.textContent = expr;
    displayResult(expr || '0');
  }

  async function compute() {
    if (!expr) return;
    statusEl.textContent = 'RUNNING...';
    try {
      const res  = await fetch('/calculate', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ expression: expr }),
      });
      const data = await res.json();
      if (data.error) {
        displayResult(data.error.toUpperCase(), true);
        statusEl.textContent = 'ERROR';
      } else {
        exprEl.textContent = expr + ' =';
        const num = parseFloat(data.result.toPrecision(12));
        expr = String(num);
        displayResult(expr);
        justComputed = true;
        statusEl.textContent = 'DONE';
      }
    } catch {
      displayResult('SERVER OFFLINE', true);
      statusEl.textContent = 'ERROR';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') append(e.key);
    else if (['+', '-', '*', '/', '.', '%'].includes(e.key)) append(e.key);
    else if (e.key === 'Enter' || e.key === '=') compute();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
